name: Build and Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "frontend/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/researchviewerapi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image ref
        id: image
        run: |
          IMAGE_NAME_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${IMAGE_NAME_LOWER}" >> "$GITHUB_ENV"
          echo "image_ref=${IMAGE_NAME_LOWER}:${GITHUB_SHA:0:5}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push commit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Write Firebase secret to self-hosted runner
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p ~/.researchviewer-secrets
          echo "$FIREBASE_SECRET" > ~/.researchviewer-secrets/firebase-service-account.json
          chmod 600 ~/.researchviewer-secrets/firebase-service-account.json

      - name: Deploy
        run: ~/dev/ResearchViewer/deploy.sh '${{ needs.build.outputs.image_ref }}'