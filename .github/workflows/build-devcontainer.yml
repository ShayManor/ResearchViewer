name: Build and Push devcontainer image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*", "latest" ]
    paths:
      - "src/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/build-devcontainer.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ResearchViewerApi

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=ref,event=branch
            type=sha

      - name: Build & push
        run: |
          IMAGE_TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ')
          TAG_ARGS=$(for tag in $IMAGE_TAGS; do echo "-t $tag"; done | tr '\n' ' ')
          docker build $TAG_ARGS -f Dockerfile .
          for tag in $IMAGE_TAGS; do docker push $tag; done